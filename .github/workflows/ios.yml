name: iOS CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'ios/**'
      - '.github/workflows/ios.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'ios/**'

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Check for Project File
        run: |
          if [ ! -d ios/ShadowMesh/ShadowMesh.xcodeproj ] && [ ! -f ios/ShadowMesh/Package.swift ]; then
            echo "::warning::iOS project file not found in expected location (ios/ShadowMesh/). Skipping build."
            exit 0
          fi

      - name: Build
        run: |
          cd ios/ShadowMesh
          if [ -d ShadowMesh.xcodeproj ]; then
            xcodebuild build -scheme ShadowMesh -destination 'platform=iOS Simulator,name=iPhone 15'
          elif [ -f Package.swift ]; then
            swift build
          fi
