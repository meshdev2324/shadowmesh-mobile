name: iOS CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'ios/**'
      - '.github/workflows/ios.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'ios/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: List available Xcode versions
        run: ls /Applications | grep Xcode

      - name: Select Xcode version
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Check for Project File
        run: |
          if [ ! -d ios/ShadowMesh/ShadowMesh.xcodeproj ] && [ ! -f ios/ShadowMesh/Package.swift ]; then
            echo "::warning::iOS project file not found in expected location (ios/ShadowMesh/). Skipping build."
            exit 0
          fi

      - name: Build
        run: |
          cd ios/ShadowMesh
          if [ -d ShadowMesh.xcodeproj ]; then
            SCHEME=$(xcodebuild -list -json | jq -r '.project.schemes[0]' || echo "ShadowMesh")
            xcodebuild build -scheme "$SCHEME" -destination 'platform=iOS Simulator,name=iPhone 15'
          elif [ -f Package.swift ]; then
            swift build
          fi
